<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skibidi Toilet - The Ultimate Memecoin</title>
  <meta name="description"
    content="Skibidi Toilet is the ultimate memecoin taking over the digital landscape. Join the revolution.">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">Skibidi</div>
      <!-- Hamburger Icon -->
      <button class="hamburger" id="hamburger" aria-label="Toggle Navigation">
        <svg xmlns="http://www.2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="#" class="nav-link">Home</a></li>
        <li><a href="#ca-section" class="nav-link">Contract</a></li>
        <li><a href="#socials" class="nav-link">Social</a></li>
        <li><a href="#gallery" class="nav-link">Gallery</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section Layout based on User Sketch -->
  <header class="hero-section">
    <div class="top-layout">
      <!-- Banner Image -->
      <div class="banner-container">
        <img src="banner.jpg" alt="Skibidi Toilet Banner" class="banner-image">
      </div>

      <!-- PFP Structure -->
      <div class="pfp-container">
        <div class="pfp-ring-border">
          <img src="image.png" alt="PFP" class="pfp-image">
        </div>
      </div>
    </div>
  </header>

  <!-- Rest of the landing page -->
  <main class="main-content">
    <section class="intro">
      <h1 class="glitch" data-text="SKIBIDI TOILET">SKIBIDI TOILET</h1>
      <p class="tagline">The memecoin event of the century.</p>

      <!-- CA Section -->
      <section id="ca-section" class="ca-section">
        <h2 class="section-title">Contract Address</h2>
        <div class="ca-box-container">
          <div class="ca-box" id="ca-box">
            <span class="ca-text" id="ca-text">CA</span>
            <button class="copy-btn" id="copy-btn" aria-label="Copy CA">
              <svg xmlns="http://www.2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="copy-icon">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
          <span class="tooltip" id="tooltip">Copied to clipboard!</span>
        </div>
      </section>

      <!-- Social Media Section -->
      <section id="socials" class="socials-wrapper">
        <h2 class="section-title">OUR SOCIALS</h2>
        <div class="social-boxes">
          <!-- X (Twitter) -->
          <a href="https://x.com/Skibidi_on_pump" class="social-box" target="_blank" rel="noopener noreferrer">
            <div class="social-icon">
              <svg xmlns="http://www.2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
              </svg>
            </div>
            <span class="social-username">Skibidi_on_pump</span>
          </a>

          <!-- Telegram -->
          <a href="https://t.me/Skibidi_on_pump" class="social-box" target="_blank" rel="noopener noreferrer">
            <div class="social-icon">
              <svg xmlns="http://www.2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 3.037-1.025 6.942-1.458 8.685-.183.74-.53 1.052-.865 1.085-.736.074-1.298-.485-2.015-.953-1.121-.733-1.754-1.192-2.839-1.905-1.252-.821-.442-1.272.274-2.016.187-.194 3.447-3.149 3.509-3.415.008-.033.016-.155-.06-.217-.076-.062-.189-.035-.27-.017-.116.026-1.968 1.258-5.556 3.682-.526.368-1.002.548-1.428.538-.47-.011-1.378-.266-2.052-.485-1.02-.332-1.83-.507-1.761-1.07.036-.296.444-.606 1.23-.93 4.839-2.106 8.061-3.493 9.664-4.161 4.582-1.921 5.534-2.25 6.138-2.26z" />
              </svg>
            </div>
            <span class="social-username">Skibidi_on_pump</span>
          </a>

          <!-- Instagram -->
          <a href="https://instagram.com/Skibidi_on_pump" class="social-box" target="_blank" rel="noopener noreferrer">
            <div class="social-icon">
              <svg xmlns="http://www.2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
            </div>
            <span class="social-username">Skibidi_on_pump</span>
          </a>
        </div>
      </section>

      <!-- Gallery Section -->
      <section id="gallery" class="gallery-section">
        <h2 class="section-title">Skibidi Toilet Meme Gallery</h2>

        <div class="gallery-slider-container">
          <button class="slider-btn prev-btn" id="prev-btn" aria-label="Previous">
            <svg xmlns="http://www.2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </button>

          <div class="meme-track" id="meme-track">
            <div class="meme-item">
              <img src="meme images/1.jpg" alt="Skibidi Meme 1" loading="lazy">
              <a href="meme images/1.jpg" download="skibidi-meme-1.jpg" class="download-btn" aria-label="Download Meme">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              </a>
            </div>
            <div class="meme-item">
              <img src="meme images/2.jpg" alt="Skibidi Meme 2" loading="lazy">
              <a href="meme images/2.jpg" download="skibidi-meme-2.jpg" class="download-btn" aria-label="Download Meme">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              </a>
            </div>
            <div class="meme-item">
              <img src="meme images/3.jpg" alt="Skibidi Meme 3" loading="lazy">
              <a href="meme images/3.jpg" download="skibidi-meme-3.jpg" class="download-btn" aria-label="Download Meme">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              </a>
            </div>
          </div>

          <button class="slider-btn next-btn" id="next-btn" aria-label="Next">
            <svg xmlns="http://www.2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
